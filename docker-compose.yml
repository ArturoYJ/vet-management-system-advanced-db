services:
  postgres:
    image: postgres:16-alpine
    container_name: corte3_postgres
    environment:
      POSTGRES_DB: clinica_vet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema_corte3.sql:/schema_corte3.sql:ro
      - ./backend:/docker-entrypoint-initdb.d/backend:ro
      - ./backend/10_load_all.sql:/docker-entrypoint-initdb.d/10_load_all.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clinica_vet"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: corte3_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: corte3_api
    working_dir: /app
    command: npm run dev
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: clinica_vet
      DB_USER: api_user
      DB_PASSWORD: api_pass
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: 300
    volumes:
      - ./api/src:/app/src
      - ./frontend:/frontend
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
